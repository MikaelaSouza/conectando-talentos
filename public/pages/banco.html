<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Banco de Currículos — Conectando Talentos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
  <style>
    .pagina-banco { max-width:1000px; margin:0 auto; padding:40px 20px 60px; }
    .pagina-banco h1 { font-family:"Sora",sans-serif; color:var(--azul); font-size:1.75rem; margin-bottom:4px; }
    .filtros { display:flex; gap:12px; flex-wrap:wrap; margin:24px 0; padding:20px; background:var(--cinza-claro); border-radius:var(--radius); }
    .filtros input, .filtros select { flex:1; min-width:160px; }
    .abas { display:flex; gap:4px; margin-bottom:20px; border-bottom:2px solid var(--borda); }
    .aba { background:none; border:none; padding:10px 20px; font-family:"Sora",sans-serif; font-size:0.9rem; font-weight:600; color:var(--cinza); cursor:pointer; border-bottom:3px solid transparent; margin-bottom:-2px; transition:all 0.2s; }
    .aba.ativa { color:var(--azul); border-bottom-color:var(--azul); }
    .aba:hover { color:var(--azul-claro); }
    .grade-curriculos { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:20px; margin-top:8px; }
    .card-curriculo { border-radius:var(--radius); border:1px solid var(--borda); background:#fff; padding:22px; box-shadow:var(--sombra); transition:transform 0.2s,box-shadow 0.2s; display:flex; flex-direction:column; gap:10px; }
    .card-curriculo:hover { transform:translateY(-3px); box-shadow:0 8px 28px rgba(26,82,118,0.14); }
    .card-curriculo h3 { font-family:"Sora",sans-serif; font-size:1rem; color:var(--azul); }
    .card-meta { font-size:0.82rem; color:var(--cinza); display:flex; flex-direction:column; gap:3px; }
    .card-acoes { display:flex; gap:8px; margin-top:4px; flex-wrap:wrap; }
    .vazio { text-align:center; padding:60px 20px; color:var(--cinza); grid-column:1/-1; }
    .vazio span { font-size:48px; display:block; margin-bottom:12px; }
    .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:200; display:flex; align-items:center; justify-content:center; padding:20px; }
    .modal { background:#fff; border-radius:18px; padding:32px; max-width:600px; width:100%; max-height:90vh; overflow-y:auto; position:relative; }
    .modal h2 { font-family:"Sora",sans-serif; color:var(--azul); margin-bottom:16px; font-size:1.4rem; }
    .modal-fechar { position:absolute; top:16px; right:20px; background:none; border:none; font-size:22px; cursor:pointer; color:var(--cinza); }
    .modal-acoes { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:20px; padding-bottom:16px; border-bottom:1px solid var(--borda); }
    .detalhe-linha { display:flex; flex-direction:column; gap:4px; margin-bottom:16px; }
    .detalhe-linha label { font-size:0.75rem; color:var(--cinza); text-transform:uppercase; letter-spacing:0.5px; font-weight:600; }
    .detalhe-linha span { font-size:0.95rem; }
    .exp-item { background:var(--cinza-claro); border-radius:8px; padding:12px 14px; margin-bottom:10px; }
    .exp-item strong { display:block; font-size:0.95rem; color:var(--azul); }
    .exp-item .periodo { font-size:0.8rem; color:var(--cinza); margin:2px 0 4px; }
    .btn-fav-ativo { background:#fff3cd; color:#856404; border-color:#ffc107; }
  </style>
</head>
<body>
  <div class="barra-acessibilidade" role="toolbar" aria-label="Ferramentas de acessibilidade">
    <button onclick="alterarFonte(1)" aria-label="Aumentar fonte">A+</button>
    <button onclick="alterarFonte(-1)" aria-label="Diminuir fonte">A-</button>
    <button onclick="alternarContraste()" aria-label="Alto contraste">◐ Contraste</button>
  </div>

  <header class="site-header">
    <nav class="nav-container" aria-label="Navegação">
      <a href="/" class="logo" aria-label="Conectando Talentos">
        <span class="logo-icon" aria-hidden="true">♿</span>
        <span>Conectando <strong>Talentos</strong></span>
      </a>
      <div style="display:flex;gap:12px;align-items:center;">
        <button onclick="logout()" class="btn btn-outline" style="font-size:0.82rem;padding:8px 16px">Sair</button>
      </div>
    </nav>
  </header>

  <main class="pagina-banco" id="main-content">
    <h1>Banco de Currículos</h1>
    <p style="color:var(--cinza);margin-bottom:4px;">Encontre talentos com deficiência para recrutamento inclusivo.</p>

    <!-- ABAS -->
    <div class="abas" role="tablist" aria-label="Visualização">
      <button class="aba ativa" id="aba-todos" role="tab" onclick="mudarAba('todos')" aria-selected="true">🔍 Todos os currículos</button>
      <button class="aba" id="aba-favoritos" role="tab" onclick="mudarAba('favoritos')" aria-selected="false">⭐ Meus favoritos</button>
    </div>

    <!-- FILTROS -->
    <form class="filtros" id="form-filtros" onsubmit="event.preventDefault();buscar()" role="search" aria-label="Filtrar currículos">
      <input type="text" id="filtro-cidade" placeholder="🏙️ Cidade" aria-label="Filtrar por cidade" />
      <select id="filtro-deficiencia" aria-label="Filtrar por tipo de deficiência">
        <option value="">Tipo de deficiência (todos)</option>
        <option>Deficiência física</option>
        <option>Deficiência visual</option>
        <option>Deficiência auditiva</option>
        <option>Deficiência intelectual</option>
        <option>Deficiência múltipla</option>
        <option>Transtorno do Espectro Autista</option>
        <option>Outra</option>
      </select>
      <input type="text" id="filtro-habilidade" placeholder="🔧 Habilidade" aria-label="Filtrar por habilidade" />
      <button type="submit" class="btn btn-primary">Buscar</button>
      <button type="button" class="btn btn-outline" onclick="limparFiltros()">Limpar</button>
    </form>

    <div id="resultado-busca" aria-live="polite">
      <p style="color:var(--cinza);font-size:0.85rem;" id="total-resultados"></p>
      <div class="grade-curriculos" id="grade" role="list"></div>
    </div>
  </main>

  <!-- MODAL DETALHE -->
  <div id="modal-overlay" class="modal-overlay" style="display:none;" role="dialog" aria-modal="true" aria-labelledby="modal-titulo">
    <div class="modal">
      <button class="modal-fechar" onclick="fecharModal()" aria-label="Fechar">✕</button>
      <div id="modal-conteudo"></div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/main.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script>
    // Garante que desfavoritarCurriculo está disponível mesmo com cache do api.js
    async function desfavoritarCurriculo(id) {
      const res = await fetch('/api/empresas/favoritos/' + id, {
        method: 'DELETE',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + localStorage.getItem('ct_token') }
      });
      return res.json();
    }
  </script>
  <script>
    const usuario = getUsuario();
    if (!usuario) window.location.href = '/pages/login.html';
    if (usuario && usuario.tipo !== 'empresa') window.location.href = '/pages/curriculo.html';

    let abaAtual = 'todos';
    let favoritosIds = new Set();

    // Carrega IDs dos favoritos ao iniciar
    async function carregarFavoritosIds() {
      const favs = await getFavoritos();
      if (Array.isArray(favs)) {
        favoritosIds = new Set(favs.map(f => f.curriculo_id));
      }
    }

    function mudarAba(aba) {
      abaAtual = aba;
      document.getElementById('aba-todos').classList.toggle('ativa', aba === 'todos');
      document.getElementById('aba-favoritos').classList.toggle('ativa', aba === 'favoritos');
      document.getElementById('form-filtros').style.display = aba === 'todos' ? 'flex' : 'none';
      document.getElementById('aba-todos').setAttribute('aria-selected', aba === 'todos');
      document.getElementById('aba-favoritos').setAttribute('aria-selected', aba === 'favoritos');
      if (aba === 'favoritos') mostrarFavoritos();
      else buscar();
    }

    async function mostrarFavoritos() {
      document.getElementById('grade').innerHTML = '<p style="color:var(--cinza)">Carregando...</p>';
      document.getElementById('total-resultados').textContent = '';
      const favs = await getFavoritos();
      if (!Array.isArray(favs) || favs.length === 0) {
        document.getElementById('grade').innerHTML = '<div class="vazio"><span>⭐</span><p>Você ainda não tem favoritos.</p></div>';
        return;
      }
      const lista = favs.map(f => ({
        id: f.curriculo_id,
        nome_completo: f.curriculos?.nome_completo || '—',
        cidade: f.curriculos?.cidade,
        tipo_deficiencia: f.curriculos?.tipo_deficiencia,
        objetivo: f.curriculos?.objetivo,
        habilidades: f.curriculos?.habilidades || [],
        favorito: true,
      }));
      document.getElementById('total-resultados').textContent = lista.length + ' favorito(s)';
      renderizarCurriculos(lista);
    }

    async function buscar() {
      const cidade = document.getElementById('filtro-cidade').value;
      const deficiencia = document.getElementById('filtro-deficiencia').value;
      const habilidade = document.getElementById('filtro-habilidade').value;
      document.getElementById('grade').innerHTML = '<p style="color:var(--cinza)">Buscando...</p>';
      const filtros = {};
      if (cidade) filtros.cidade = cidade;
      if (deficiencia) filtros.deficiencia = deficiencia;
      if (habilidade) filtros.habilidade = habilidade;
      const curriculos = await buscarCurriculos(filtros);
      renderizarCurriculos(Array.isArray(curriculos) ? curriculos : []);
    }

    function renderizarCurriculos(lista) {
      const grade = document.getElementById('grade');
      const total = document.getElementById('total-resultados');
      if (abaAtual === 'todos') total.textContent = lista.length + ' currículo(s) encontrado(s)';
      if (lista.length === 0) {
        grade.innerHTML = '<div class="vazio"><span>🔍</span><p>Nenhum currículo encontrado.</p></div>';
        return;
      }
      grade.innerHTML = lista.map(c => {
        const ehFav = c.favorito || favoritosIds.has(c.id);
        return `
        <article class="card-curriculo" role="listitem">
          <h3>${c.nome_completo}</h3>
          <div class="card-meta">
            ${c.cidade ? '<span>📍 ' + c.cidade + (c.estado ? ', '+c.estado : '') + '</span>' : ''}
            ${c.tipo_deficiencia ? '<span>♿ ' + c.tipo_deficiencia + '</span>' : ''}
            ${c.objetivo ? '<span style="color:var(--texto);font-size:0.82rem;margin-top:4px">' + c.objetivo + '</span>' : ''}
          </div>
          ${(c.habilidades||[]).length ? '<div style="display:flex;flex-wrap:wrap;gap:6px">' +
            c.habilidades.slice(0,4).map(h => '<span class="badge badge-pcd">'+h+'</span>').join('') +
            (c.habilidades.length > 4 ? '<span class="badge" style="background:#f0f0f0;color:var(--cinza)">+' + (c.habilidades.length-4) + '</span>' : '') +
          '</div>' : ''}
          <div class="card-acoes">
            <button onclick="verDetalhe('${c.id}')" class="btn btn-primary" style="font-size:0.82rem;padding:8px 14px" aria-label="Ver currículo de ${c.nome_completo}">
              Ver currículo
            </button>
            <button id="fav-${c.id}" onclick="favoritar('${c.id}', this)" class="btn ${ehFav ? 'btn-fav-ativo' : 'btn-outline'}" style="font-size:0.82rem;padding:8px 14px" aria-label="${ehFav ? 'Desfavoritar' : 'Favoritar'} ${c.nome_completo}">
              ${ehFav ? '⭐ Favoritado' : '⭐ Favoritar'}
            </button>
          </div>
        </article>`;
      }).join('');
    }

    let curriculoAtual = null;

    async function verDetalhe(id) {
      const c = await getCurriculo(id);
      curriculoAtual = c;
      const overlay = document.getElementById('modal-overlay');
      const conteudo = document.getElementById('modal-conteudo');
      const ehFav = favoritosIds.has(id);

      const exp = (c.experiencias||[]).map(e => `
        <div class="exp-item">
          <strong>${e.cargo}${e.empresa ? ' — '+e.empresa : ''}</strong>
          ${e.periodo ? '<div class="periodo">📅 '+e.periodo+'</div>' : ''}
          ${e.descricao ? '<p style="font-size:0.88rem;color:#555;margin-top:4px">'+e.descricao+'</p>' : ''}
        </div>`).join('') || '<p style="color:var(--cinza)">Não informado</p>';

      const form = (c.formacoes||[]).map(f =>
        '<div class="exp-item"><strong>'+f.curso+'</strong>' +
        (f.instituicao ? ' — '+f.instituicao : '') +
        (f.periodo ? '<div class="periodo">📅 '+f.periodo+'</div>' : '') + '</div>'
      ).join('') || '<p style="color:var(--cinza)">Não informado</p>';

      conteudo.innerHTML = `
        <h2 id="modal-titulo">${c.nome_completo}</h2>
        <div class="modal-acoes">
          <button onclick="imprimirPDF()" class="btn btn-outline" style="font-size:0.85rem" aria-label="Imprimir currículo em PDF">
            📄 Baixar PDF
          </button>
          <button id="modal-fav-btn" onclick="favoritar('${c.id}', this, true)" class="btn ${ehFav ? 'btn-fav-ativo' : 'btn-outline'}" style="font-size:0.85rem" aria-label="${ehFav ? 'Desfavoritar' : 'Favoritar'} candidato">
            ${ehFav ? '⭐ Favoritado' : '⭐ Favoritar'}
          </button>
        </div>
        ${c.tipo_deficiencia ? '<span class="badge badge-pcd" style="margin-bottom:16px;display:inline-block">♿ '+c.tipo_deficiencia+(c.cid ? '  (CID: '+c.cid+')' : '')+'</span>' : ''}
        ${c.objetivo ? '<div class="detalhe-linha"><label>Objetivo</label><span>'+c.objetivo+'</span></div>' : ''}
        ${c.sobre_mim ? '<div class="detalhe-linha"><label>Sobre</label><span>'+c.sobre_mim+'</span></div>' : ''}
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px">
          ${c.cidade ? '<div class="detalhe-linha" style="margin:0"><label>Localização</label><span>'+c.cidade+(c.estado ? ', '+c.estado : '')+'</span></div>' : ''}
          ${c.telefone ? '<div class="detalhe-linha" style="margin:0"><label>Telefone</label><span>'+c.telefone+'</span></div>' : ''}
        </div>
        <div class="detalhe-linha"><label>Experiências</label>${exp}</div>
        <div class="detalhe-linha"><label>Formação</label>${form}</div>
        ${(c.habilidades||[]).length ? '<div class="detalhe-linha"><label>Habilidades</label><div style="display:flex;flex-wrap:wrap;gap:6px">'+c.habilidades.map(h=>'<span class="badge badge-pcd">'+h+'</span>').join('')+'</div></div>' : ''}
        ${(c.idiomas||[]).length ? '<div class="detalhe-linha"><label>Idiomas</label><span>'+c.idiomas.map(i=>i.idioma+' ('+i.nivel+')').join(' • ')+'</span></div>' : ''}
        ${c.necessidades_especiais ? '<div class="detalhe-linha"><label>Acessibilidade necessária</label><span>'+c.necessidades_especiais+'</span></div>' : ''}
      `;

      overlay.style.display = 'flex';
      document.querySelector('.modal-fechar').focus();
    }

    function imprimirPDF() {
      if (!curriculoAtual) return;
      const c = curriculoAtual;
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF({ unit: 'mm', format: 'a4' });
      const azul = [26, 82, 118];
      const azulClaro = [46, 134, 193];
      const W = 210, margem = 18;
      let y = 0;

      doc.setFillColor(...azul);
      doc.rect(0, 0, W, 44, 'F');
      doc.setFillColor(...azulClaro);
      doc.rect(0, 0, 5, 44, 'F');
      doc.setTextColor(255, 255, 255);
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(18);
      doc.text(c.nome_completo, margem + 2, 13);
      doc.setFont('helvetica', 'normal');
      doc.setFontSize(10);
      if (c.objetivo) { doc.setTextColor(200, 225, 245); doc.text(c.objetivo, margem + 2, 20); }
      doc.setTextColor(230, 240, 250);
      doc.setFontSize(9);
      const contatoParts = [c.telefone, c.cidade ? c.cidade+(c.estado?'/'+c.estado:'') : '', c.linkedin].filter(Boolean);
      const linhasContato = doc.splitTextToSize(contatoParts.join('   |   '), W - margem * 2 - 4);
      linhasContato.forEach((l, i) => doc.text(l, margem + 2, 27 + i * 5));
      if (c.tipo_deficiencia) {
        doc.setTextColor(180, 220, 255); doc.setFont('helvetica', 'bold'); doc.setFontSize(9);
        doc.text('Def.: ' + c.tipo_deficiencia + (c.cid ? '  (CID: '+c.cid+')' : ''), margem + 2, 41);
      }
      y = 54;

      function secao(titulo) {
        doc.setFont('helvetica', 'bold'); doc.setFontSize(11); doc.setTextColor(...azul);
        doc.text(titulo.toUpperCase(), margem, y);
        doc.setDrawColor(...azul); doc.line(margem, y + 1, W - margem, y + 1);
        y += 7; doc.setTextColor(30, 30, 30); doc.setFont('helvetica', 'normal'); doc.setFontSize(10);
      }
      function checkPage() { if (y > 270) { doc.addPage(); y = 18; } }
      function texto(t, negrito = false) {
        if (!t) return;
        doc.setFont('helvetica', negrito ? 'bold' : 'normal');
        const linhas = doc.splitTextToSize(t, W - margem * 2);
        linhas.forEach(l => { checkPage(); doc.text(l, margem, y); y += 5.5; });
      }

      if (c.sobre_mim) { secao('Sobre mim'); texto(c.sobre_mim); y += 4; }
      if ((c.experiencias||[]).length) {
        secao('Experiência Profissional');
        c.experiencias.forEach(e => {
          checkPage();
          texto(e.cargo + (e.empresa ? ' — ' + e.empresa : '') + (e.periodo ? '  (' + e.periodo + ')' : ''), true);
          if (e.descricao) texto(e.descricao);
          y += 3;
        });
      }
      if ((c.formacoes||[]).length) {
        secao('Formação Acadêmica');
        c.formacoes.forEach(f => { checkPage(); texto(f.curso + (f.instituicao ? ' — ' + f.instituicao : '') + (f.periodo ? '  (' + f.periodo + ')' : ''), true); y += 2; });
        y += 2;
      }
      if ((c.habilidades||[]).length) { secao('Habilidades'); texto(c.habilidades.join('   •   ')); y += 4; }
      if ((c.idiomas||[]).length) { secao('Idiomas'); texto(c.idiomas.map(i => i.idioma + ' (' + i.nivel + ')').join('   •   ')); y += 4; }
      if (c.necessidades_especiais) { secao('Necessidades de Acessibilidade'); texto(c.necessidades_especiais); }

      doc.save('curriculo-' + c.nome_completo.replace(/\s+/g, '_') + '.pdf');
    }

    function fecharModal() {
      document.getElementById('modal-overlay').style.display = 'none';
      curriculoAtual = null;
    }

    document.addEventListener('keydown', e => { if (e.key === 'Escape') fecharModal(); });

    async function favoritar(id, btn, doModal = false) {
      const ehFav = favoritosIds.has(id);
      console.log('[favoritar] id:', id, '| ehFav:', ehFav, '| favoritosIds:', [...favoritosIds]);

      if (ehFav) {
        // DESFAVORITAR
        console.log('[favoritar] chamando desfavoritarCurriculo...');
        try {
          const res = await desfavoritarCurriculo(id);
          console.log('[favoritar] resposta desfavoritar:', res);
          if (res.mensagem) {
            favoritosIds.delete(id);
            atualizarBotaoFav(id, false, doModal ? btn : null);
          } else {
            alert('Erro ao desfavoritar: ' + (res.erro || 'Resposta inesperada'));
          }
        } catch(e) {
          console.error('[favoritar] exceção:', e);
          alert('Exceção ao desfavoritar: ' + e.message);
        }
      } else {
        // FAVORITAR
        console.log('[favoritar] chamando favoritarCurriculo...');
        try {
          const res = await favoritarCurriculo(id);
          console.log('[favoritar] resposta favoritar:', res);
          if (res.mensagem || res.erro === 'Já está nos favoritos.') {
            favoritosIds.add(id);
            atualizarBotaoFav(id, true, doModal ? btn : null);
          } else {
            alert('Erro ao favoritar: ' + (res.erro || 'Resposta inesperada'));
          }
        } catch(e) {
          console.error('[favoritar] exceção:', e);
          alert('Exceção ao favoritar: ' + e.message);
        }
      }
    }

    function atualizarBotaoFav(id, ativo, modalBtn) {
      const label = ativo ? '⭐ Favoritado' : '⭐ Favoritar';
      // Atualiza botão no card
      const cardBtn = document.getElementById('fav-' + id);
      if (cardBtn) {
        cardBtn.textContent = label;
        cardBtn.className = 'btn ' + (ativo ? 'btn-fav-ativo' : 'btn-outline');
        cardBtn.style.fontSize = '0.82rem';
        cardBtn.style.padding = '8px 14px';
        cardBtn.setAttribute('aria-label', (ativo ? 'Desfavoritar' : 'Favoritar') + ' candidato');
      }
      // Atualiza botão no modal
      if (modalBtn) {
        modalBtn.textContent = label;
        modalBtn.className = 'btn ' + (ativo ? 'btn-fav-ativo' : 'btn-outline');
        modalBtn.style.fontSize = '0.85rem';
        modalBtn.setAttribute('aria-label', (ativo ? 'Desfavoritar' : 'Favoritar') + ' candidato');
      }
      // Se está na aba de favoritos e desfavoritou, recarrega a lista
      if (!ativo && abaAtual === 'favoritos') {
        setTimeout(mostrarFavoritos, 300);
      }
    }

    function limparFiltros() {
      document.getElementById('filtro-cidade').value = '';
      document.getElementById('filtro-deficiencia').value = '';
      document.getElementById('filtro-habilidade').value = '';
      buscar();
    }

    // INIT
    carregarPreferencias();
    carregarFavoritosIds().then(() => buscar());
  </script>
</body>
</html>
